<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dummy Website</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { font-family: Arial, sans-serif; background: #f0f0f0; text-align: center; padding: 50px; }
    
    /* Pop-up Modal Styling */
    .modal-overlay {
      display: none; /* Hidden by default */
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.6); z-index: 9999;
      justify-content: center; align-items: center;
    }
    .modal-box {
      background: white; padding: 20px; border-radius: 10px;
      max-width: 400px; width: 90%; text-align: center; position: relative;
      box-shadow: 0 4px 20px rgba(0,0,0,0.2);
    }
    .modal-box img { max-width: 100%; border-radius: 8px; margin-bottom: 15px; }
    .modal-box h2 { margin: 10px 0; color: #333; }
    .modal-box p { color: #666; margin-bottom: 20px; }
    .modal-box a {
      background: #2563eb; color: white; padding: 10px 20px;
      text-decoration: none; border-radius: 5px; display: inline-block;
    }
    .close-btn {
      position: absolute; top: 10px; right: 15px; font-size: 24px;
      color: #999; cursor: pointer; border: none; background: none;
    }
    .close-btn:hover { color: #333; }
  </style>
</head>
<body>

  <h1>Welcome to my Dummy Website 🌐</h1>
  <p>This is just normal website content. An advertisement will pop up shortly!</p>

  <!-- Pop-up Ad Container -->
  <div class="modal-overlay" id="adModal">
    <div class="modal-box">
      <button class="close-btn" onclick="closeAd()">&times;</button>
      <div id="adContent">Loading Ad...</div>
    </div>
  </div>

  <script>
    // Your Supabase Keys
    const SUPABASE_URL = 'https://jbyctjddlbyddzavmczg.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpieWN0amRkbGJ5ZGR6YXZtY3pnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIzNzE2NzYsImV4cCI6MjA5Nzk0NzY3Nn0.klEa0-zSGbHZYA-fYiHYg4ceoL1PQ87gowGEbvVmhqU';
    
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // Function to fetch and show ad
    async function loadAd() {
      // Fetch the latest active ad from Supabase
      const { data, error } = await sb
        .from('advertisements')
        .select('*')
        .eq('is_active', true)
        .order('created_at', { ascending: false })
        .limit(1)
        .single();

      if (error || !data) {
        console.log("No active ads found or error fetching.");
        return; // Don't show popup if no ad exists
      }

      // Fill the popup with ad data
      const adContent = document.getElementById('adContent');
      adContent.innerHTML = `
        ${data.image_url ? `<img src="${data.image_url}" alt="Ad Image">` : ''}
        <h2>${data.title}</h2>
        <p>${data.description}</p>
        ${data.cta_link ? `<a href="${data.cta_link}" target="_blank">Click Here</a>` : ''}
      `;

      // Show the popup after 2 seconds
      setTimeout(() => {
        document.getElementById('adModal').style.display = 'flex';
      }, 2000);
    }

    // Function to close popup
    function closeAd() {
      document.getElementById('adModal').style.display = 'none';
    }

    // Run the function when page loads
    window.onload = loadAd;
  </script>
</body>
</html>
